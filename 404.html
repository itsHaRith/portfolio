<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: var(--bg-color);
            color: var(--text-color);
        }
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: var(--primary-color);
            font-family: var(--font-en);
            line-height: 1;
        }
        .error-msg {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="error-page">
        <h1 class="error-code glitch" data-text="404">404</h1>
        <p class="error-msg">Oops! The page you are looking for does not exist.</p>
        <a href="/" class="btn">Go Back Home</a>
    </div>
</body>
</html>
